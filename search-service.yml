server:
  port: 8086

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${SEARCH_DB_NAME:search_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:MySQL@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

resilience4j:
  ratelimiter:
    instances:
      searchEndpoint:
        limit-for-period: 20
        limit-refresh-period: 1s
        timeout-duration: 0s

springdoc:
  swagger-ui:
    enabled: false

server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${RESUME_DB_NAME:resume_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:MySQL@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: ${RESUME_MAX_FILE_SIZE:5MB}
      max-request-size: ${RESUME_MAX_REQUEST_SIZE:5MB}

jwt:
  secret: ${JWT_SECRET:VGhpc0lzQVNlY3VyZUJhc2U2NEVuY29kZWRTZWNyZXRLZXlGb3JKb2JQb3J0YWwyMDI2IQ==}

app:
  resume:
    upload-dir: ${RESUME_UPLOAD_DIR:./uploads/resumes}
    max-file-size-bytes: ${RESUME_MAX_FILE_SIZE_BYTES:5242880}

springdoc:
  swagger-ui:
    enabled: false
